// Continuous 0-100% credit instead of a flat pass/fail: partial credit scales with how close
// actual is to goal, so "barely missed" and "way over goal" don't score identically.
function scoreFor(bucketKey, actualPct, goalPct){
  if(bucketKey === 'current'){
    if(goalPct <= 0) return 1;
    return Math.max(0, Math.min(1, actualPct / goalPct));
  }
  if(actualPct <= goalPct) return 1;
  if(goalPct <= 0) return 0;
  return Math.max(0, Math.min(1, goalPct / actualPct));
}

// ---------- date / bucket helpers ----------
function todayLocalMidnight(){ const d = new Date(); d.setHours(0,0,0,0); return d; }
function parseDateStr(s){ if(!s) return null; const d = new Date(s + 'T00:00:00'); return isNaN(d) ? null : d; }
function daysBetween(a,b){ return Math.round((a - b) / 86400000); }
function toDateStr(d){ return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); }
function mondayOfWeek(d){ const monday = new Date(d); monday.setDate(d.getDate() - ((d.getDay()+6)%7)); return monday; }

// Weekday count strictly after promise_date, up through today (Mon-Fri only, no holiday
// awareness). null if not past due (blank or future promise date) - the date buffer only ever
// hides rows that are actually overdue.
function businessDaysPast(row){
  if(!row.promise_date) return null;
  const pd = parseDateStr(row.promise_date);
  if(!pd) return null;
  const today = todayLocalMidnight();
  if(pd > today) return null;
  let count = 0;
  const d = new Date(pd);
  while(d.getTime() < today.getTime()){
    d.setDate(d.getDate() + 1);
    const day = d.getDay();
    if(day !== 0 && day !== 6) count++;
  }
  return count;
}

// Presets for the Large Orders ETA filter: business week runs Monday-Saturday.
function etaPresetRanges(){
  const today = todayLocalMidnight();
  const monday = mondayOfWeek(today);
  const thisWeekEnd = new Date(monday); thisWeekEnd.setDate(monday.getDate()+5);
  const nextMonday = new Date(monday); nextMonday.setDate(monday.getDate()+7);
  const nextWeekEnd = new Date(nextMonday); nextWeekEnd.setDate(nextMonday.getDate()+5);
  const next30End = new Date(today); next30End.setDate(today.getDate()+30);
  return {
    thisWeek: { from: toDateStr(monday), to: toDateStr(thisWeekEnd) },
    nextWeek: { from: toDateStr(nextMonday), to: toDateStr(nextWeekEnd) },
    next30: { from: toDateStr(today), to: toDateStr(next30End) }
  };
}

function pastDaysOf(row){
  if(!row.promise_date) return null;
  const pd = parseDateStr(row.promise_date);
  if(!pd) return null;
  return daysBetween(todayLocalMidnight(), pd);
}
function bucketOf(row){
  if(!row.promise_date) return 'blank';
  const d = pastDaysOf(row);
  if(d === null) return 'blank';
  if(d <= 6) return 'current';
  if(d <= 13) return 'b7';
  if(d <= 20) return 'b14';
  if(d <= 27) return 'b21';
  return 'b28';
}

function fmtPastDays(row){ const d = pastDaysOf(row); if(d===null) return 'Blank'; if(d<0) return `in ${-d}d`; if(d===0) return 'due today'; return `${d}d past`; }

// ---------- data loading ----------
async function loadAll(){
  let all = [];
  let from = 0;
  const pageSize = 1000;
  while(true){
    const { data, error } = await sb.from('po_lines').select('*').range(from, from + pageSize - 1);
    if(error) throw error;
    all = all.concat(data);
    if(data.length < pageSize) break;
    from += pageSize;
  }
  return all;
}

async function loadLastBatch(){
  const { data, error } = await sb.from('report_batches').select('*').order('uploaded_at', { ascending:false }).limit(1);
  if(error) throw error;
  return (data && data[0]) || null;
}

async function loadAppSettings(){
  const { data, error } = await sb.from('app_settings').select('*').eq('id', true).single();
  if(error){ console.error(error); return { date_buffer_days: 0, last_received_upload_at: null, last_received_upload_filename: null }; }
  return data;
}
async function saveDateBufferDays(days){
  const { error } = await sb.from('app_settings').update({ date_buffer_days: days, updated_at: new Date().toISOString() }).eq('id', true);
  if(error) throw error;
}
async function saveLastReceivedUpload(filename){
  const nowIso = new Date().toISOString();
  const { error } = await sb.from('app_settings').update({ last_received_upload_at: nowIso, last_received_upload_filename: filename, updated_at: nowIso }).eq('id', true);
  if(error) throw error;
  return nowIso;
}

async function refreshData(){
  document.getElementById('lastUpdated').textContent = 'Loading…';
  const [lines, batch, settings] = await Promise.all([loadAll(), loadLastBatch(), loadAppSettings()]);
  state.poLines = lines;
  state.lastBatch = batch;
  state.dateBufferDays = settings.date_buffer_days || 0;
  state.lastReceivedUploadAt = settings.last_received_upload_at || null;
  state.lastReceivedUploadFilename = settings.last_received_upload_filename || null;
  state.loadedAt = new Date();
  document.getElementById('lastUpdated').textContent = batch
    ? `Last upload: ${new Date(batch.uploaded_at).toLocaleString()} · ${batch.row_count} open POs`
    : 'No data uploaded yet';
  render();
}

// ---------- modal ----------
function showModal(html){
  document.getElementById('modalRoot').innerHTML = `<div class="modal-overlay" id="modalOverlay"><div class="modal">${html}</div></div>`;
  document.getElementById('modalOverlay').addEventListener('click', (e)=>{ if(e.target.id==='modalOverlay') closeModal(); });
}
function closeModal(){ document.getElementById('modalRoot').innerHTML = ''; }

// ---------- render dispatch ----------
function render(){
  const app = document.getElementById('app');
  // Full re-render replaces every input's DOM node, which would otherwise drop focus
  // after each keystroke. Remember what was focused (and cursor position) and restore it.
  const active = document.activeElement;
  const focusInfo = (active && active.id && app.contains(active))
    ? { id: active.id, selStart: active.selectionStart, selEnd: active.selectionEnd }
    : null;

  if(state.view === 'rollup') app.innerHTML = renderRollup();
  else if(state.view === 'open') app.innerHTML = renderOpenTable();
  else if(state.view === 'large') app.innerHTML = renderLargeOrders();
  else if(state.view === 'upload') app.innerHTML = renderUpload();
  attachViewHandlers();

  if(focusInfo){
    const el = document.getElementById(focusInfo.id);
    if(el){
      el.focus();
      if(typeof el.setSelectionRange === 'function' && focusInfo.selStart != null){
        try { el.setSelectionRange(focusInfo.selStart, focusInfo.selEnd); } catch(e){}
      }
    }
  }
}

// ============================================================
// SCORECARD (composite of the Total row, weighted by IMPORTANCE)
// ============================================================
function renderScorecard(totals, totalAll, goals){
  let composite = 0;
  const rowsHtml = BUCKET_ORDER.map(b=>{
    const actualPct = totalAll ? totals[b] / totalAll : 0;
    const goalPct = goals[b];
    const score = scoreFor(b, actualPct, goalPct);
    const importance = IMPORTANCE[b];
    composite += score * importance;
    const scoreCls = score >= 0.9 ? 'cell-good' : score >= 0.6 ? 'cell-warn' : 'cell-bad';
    const impCls = importance >= 0.20 ? 'cell-bad' : importance >= 0.10 ? 'cell-warn' : 'cell-good';
    const goalDisplay = b === 'current' ? `≥ ${(goalPct*100).toFixed(0)}%` : `≤ ${(goalPct*100).toFixed(0)}%`;
    return `<tr>
      <td>${BUCKET_LABELS[b]}</td>
      <td>${goalDisplay}</td>
      <td>${(actualPct*100).toFixed(1)}%</td>
      <td class="${scoreCls}">${(score*100).toFixed(0)}%</td>
      <td class="${impCls}">${(importance*100).toFixed(0)}%</td>
    </tr>`;
  }).join('');
  const compositeCls = composite >= OVERALL_SCORE_GOAL ? 'cell-good' : 'cell-bad';

  return `
    <div class="panel">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:10px;">
        <h2 style="margin:0;font-size:15px;">Scorecard</h2>
        <div style="font-size:13px;display:flex;align-items:center;gap:10px;">
          <span style="color:var(--muted);">Composite Score</span>
          <span class="${compositeCls}" style="padding:3px 10px;border-radius:20px;font-size:14px;">${(composite*100).toFixed(1)}%</span>
          <span style="color:var(--muted);">vs. target ${(OVERALL_SCORE_GOAL*100).toFixed(0)}%</span>
        </div>
      </div>
      <table>
        <thead><tr><th>Bucket</th><th>Goal</th><th>Actual</th><th>Score</th><th>Importance</th></tr></thead>
        <tbody>${rowsHtml}</tbody>
      </table>
      <p style="color:var(--muted);font-size:12px;margin-top:12px;margin-bottom:0;">
        Score = how close Actual is to Goal (100% if met/beat, partial credit scaled by the gap if missed).
        Importance = each bucket's weight in the composite (edit <code>IMPORTANCE</code> in the source to retune).
      </p>
    </div>
  `;
}

// ============================================================
// MANAGER ROLLUP
// ============================================================
function renderRollup(){
  let active = state.poLines.filter(r=>r.is_active);
  if(state.rollupScope === 'purchasing') active = active.filter(r=>isPurchasingAssociate(r.ordered_by));
  const groupField = state.rollupGroupBy === 'store' ? 'store' : 'ordered_by';
  const groups = new Map();
  for(const row of active){
    const key = groupField==='store' ? (row.store ?? '—') : (row.ordered_by || '—');
    if(!groups.has(key)) groups.set(key, { current:0, b7:0, b14:0, b21:0, b28:0, blank:0 });
    const g = groups.get(key);
    const bucket = bucketOf(row);
    const val = state.rollupMetric === 'dollars' ? (Number(row.total_cost)||0) : 1;
    g[bucket] += val;
  }
  const totals = { current:0, b7:0, b14:0, b21:0, b28:0, blank:0 };
  active.forEach(row=>{
    const bucket = bucketOf(row);
    totals[bucket] += state.rollupMetric === 'dollars' ? (Number(row.total_cost)||0) : 1;
  });

  const goals = GOALS[state.rollupMetric];
  const rows = Array.from(groups.entries()).sort((a,b)=> String(a[0]).localeCompare(String(b[0]), undefined, {numeric:true}));

  function pctCell(bucketKey, value, rowTotal){
    const pct = rowTotal ? value/rowTotal : 0;
    const goal = goals[bucketKey];
    let cls = '';
    if(bucketKey === 'current'){ cls = pct >= goal ? 'cell-good' : 'cell-bad'; }
    else { cls = pct <= goal ? 'cell-good' : 'cell-bad'; }
    const display = state.rollupMetric === 'dollars' ? fmtMoney(value) : value;
    return `<td class="${cls}">${(pct*100).toFixed(0)}% <span style="font-weight:400;opacity:.65">(${display})</span></td>`;
  }

  const totalAll = Object.values(totals).reduce((a,b)=>a+b,0);

  return `
    <div class="stat-row">
      <div class="stat"><div class="num">${active.length.toLocaleString()}</div><div class="label">Open POs</div></div>
      <div class="stat"><div class="num">${fmtMoney(active.reduce((s,r)=>s+(Number(r.total_cost)||0),0))}</div><div class="label">Total $ Open</div></div>
    </div>
    ${renderScorecard(totals, totalAll, goals)}
    <div class="panel">
      <div class="toolbar">
        <span style="font-weight:700;">Metric:</span>
        <div class="toggle-group" id="metricToggle">
          <button data-metric="dollars" class="${state.rollupMetric==='dollars'?'active':''}">Dollars</button>
          <button data-metric="count" class="${state.rollupMetric==='count'?'active':''}">Count</button>
        </div>
        <span style="font-weight:700;margin-left:16px;">Group by:</span>
        <div class="toggle-group" id="groupToggle">
          <button data-group="ordered_by" class="${state.rollupGroupBy==='ordered_by'?'active':''}">Ordered By</button>
          <button data-group="store" class="${state.rollupGroupBy==='store'?'active':''}">Store</button>
        </div>
        <span style="font-weight:700;margin-left:16px;">Scope:</span>
        <div class="toggle-group" id="scopeToggle">
          <button data-scope="all" class="${state.rollupScope==='all'?'active':''}">All POs</button>
          <button data-scope="purchasing" class="${state.rollupScope==='purchasing'?'active':''}">Purchasing Associates</button>
        </div>
      </div>
      <table>
        <thead><tr>
          <th>${state.rollupGroupBy==='store'?'Store':'Ordered By'}</th>
          <th>Current</th><th>7 Days Past</th><th>14 Days Past</th><th>21 Days Past</th><th>28+ Days Past</th><th>Blank</th>
        </tr></thead>
        <tbody>
          <tr style="font-weight:700;background:#fafbfc;">
            <td>Total</td>
            ${BUCKET_ORDER.map(b=>pctCell(b, totals[b], totalAll)).join('')}
          </tr>
          ${rows.map(([key, g])=>{
            const rowTotal = Object.values(g).reduce((a,b)=>a+b,0);
            return `<tr><td>${key}</td>${BUCKET_ORDER.map(b=>pctCell(b, g[b], rowTotal)).join('')}</tr>`;
          }).join('')}
        </tbody>
      </table>
      <p style="color:var(--muted);font-size:12px;margin-top:12px;">
        Goals (${state.rollupMetric}): Current ≥ ${(goals.current*100).toFixed(0)}%,
        7d ≤ ${(goals.b7*100).toFixed(0)}%, 14d ≤ ${(goals.b14*100).toFixed(0)}%,
        21d ≤ ${(goals.b21*100).toFixed(0)}%, 28+ ≤ ${(goals.b28*100).toFixed(0)}%, Blank ≤ ${(goals.blank*100).toFixed(0)}%
      </p>
    </div>
  `;
}

// ============================================================
// filtering helpers (shared by the table, the filter cards, and CSV export)
// ============================================================
// Normalizes "EMILY.FOX" / "Emily Fox" / "emily fox" to the same key so near-duplicate
// spellings of the same person aggregate into one filter card instead of three.
function nameKey(name){ return (name||'').toUpperCase().replace(/[^A-Z0-9]/g,''); }

// Purchasing team roster - used both for the "Purchasing Associates Only" filter and as the
// list of names in the "who's using this" identity picker (see IDENTITY section below).
const PURCHASING_ASSOCIATE_NAMES = ['Alani Copas','Chris Rose','Devan Stonebraker','Aundrea Wells',
  'Marissa Devore','Dave Levisay','Scott Burmeister','Todd Gies','Jude Hoferkamp','Mikel Hartman'];
// Ordered By values in the data are inconsistent (full name vs. last-name-only vs. truncated,
// e.g. "Devan Stonebraker" shows up as "DEVAN.STONEBRAK") so this matches on nameKey substring
// in either direction rather than requiring an exact match.
const PURCHASING_ASSOCIATE_KEYS = PURCHASING_ASSOCIATE_NAMES.map(nameKey);
function isPurchasingAssociate(orderedBy){
  const key = nameKey(orderedBy);
  if(!key) return false;
  return PURCHASING_ASSOCIATE_KEYS.some(assocKey => key.includes(assocKey) || assocKey.includes(key));
}

// 'none': nothing received yet. 'partial': some received, less than ordered. 'full': received
// meets or exceeds ordered (received can legitimately exceed ordered - it's cumulative across
// reorders on the same PO suffix, per the received-qty report).
// Amount Ordered (from the PO Listing report) is the REMAINING balance - RFMS decrements it
// as a PO gets received, it isn't a fixed original total. So as long as there's still a
// remaining balance (ordered > 0), the PO is partially received, no matter how large the
// all-time received count is (that count can span multiple reorders on the same PO suffix).
// Only once nothing remains (ordered <= 0) is it genuinely 'full'.
function receivedStatusOf(row){
  const received = Number(row.amount_received) || 0;
  const ordered = Number(row.amount_ordered) || 0;
  if(received <= 0) return 'none';
  if(ordered > 0) return 'partial';
  return 'full';
}

// Reconstructs the true original order quantity: remaining balance + what's already been
// received. Only meaningful while something is still outstanding ('partial'); once a PO is
// 'full' there's nothing remaining to add back, so just show Amount Ordered as-is.
function displayOrderedQty(row){
  const ordered = Number(row.amount_ordered) || 0;
  const received = Number(row.amount_received) || 0;
  return receivedStatusOf(row) === 'partial' ? ordered + received : ordered;
}

// Shared click behavior for multiselect filter cards: clicking "All" (value === '') clears
// the selection; clicking a value toggles it in/out of the array.
function toggleFilterValue(filtersObj, dim, value){
  if(value === ''){ filtersObj[dim] = []; return; }
  const arr = filtersObj[dim];
  const idx = arr.indexOf(value);
  if(idx === -1) arr.push(value); else arr.splice(idx, 1);
}

function matchesFilters(r, filters, excludeDim){
  if(filters.activeOnly && !r.is_active) return false;
  if(filters.purchasingOnly && !isPurchasingAssociate(r.ordered_by)) return false;
  if(excludeDim!=='orderedBy' && filters.orderedBy.length && !filters.orderedBy.includes(nameKey(r.ordered_by))) return false;
  if(excludeDim!=='store' && filters.store.length && !filters.store.includes(String(r.store))) return false;
  if(excludeDim!=='bucket' && filters.bucket.length && !filters.bucket.includes(bucketOf(r))) return false;
  if(excludeDim!=='worked' && filters.worked.length && !filters.worked.includes(String(!!r.worked))) return false;
  if(excludeDim!=='vendor' && filters.vendor.length && !filters.vendor.includes(r.supplier)) return false;
  if(filters.receivedStatus && receivedStatusOf(r) !== filters.receivedStatus) return false;
  if(state.dateBufferDays > 0){
    const bd = businessDaysPast(r);
    if(bd !== null && bd < state.dateBufferDays) return false;
  }
  if(filters.supplier && !(r.supplier||'').toLowerCase().includes(filters.supplier.toLowerCase())) return false;
  if(filters.search){
    const s = filters.search.toLowerCase();
    const hit = (r.po_number||'').toLowerCase().includes(s) || (r.style_name||'').toLowerCase().includes(s) || (r.sidemark||'').toLowerCase().includes(s) || (r.reference_number||'').toLowerCase().includes(s);
    if(!hit) return false;
  }
  return true;
}
function filterRows(filters){ return state.poLines.filter(r=>matchesFilters(r, filters, null)); }

function storeOptionsList(){
  return Array.from(new Set(state.poLines.map(r=>r.store).filter(v=>v!==null && v!==undefined)))
    .sort((a,b)=>a-b)
    .map(v=>({ value: String(v), label: `Store ${v}` }));
}
function productCodeOptionsList(){
  return Array.from(new Set(state.poLines.map(r=>r.product_code).filter(v=>v)))
    .sort((a,b)=>a.localeCompare(b))
    .map(v=>({ value: v, label: productCodeLabel(v) }));
}
function vendorOptionsList(){
  return Array.from(new Set(state.poLines.map(r=>r.supplier).filter(v=>v)))
    .sort((a,b)=>a.localeCompare(b))
    .map(v=>({ value: v, label: v }));
}

// counts per option for one filter dimension, honoring every OTHER active filter (facet counts)
function facetCounts(dim){
  const counts = new Map();
  state.poLines.forEach(r=>{
    if(!matchesFilters(r, state.filters, dim)) return;
    let key;
    if(dim === 'orderedBy') key = r.ordered_by ? nameKey(r.ordered_by) : null;
    else if(dim === 'store') key = (r.store===null||r.store===undefined) ? null : String(r.store);
    else if(dim === 'worked') key = String(!!r.worked);
    else if(dim === 'vendor') key = r.supplier || null;
    else key = bucketOf(r);
    if(key === null) return;
    counts.set(key, (counts.get(key)||0) + 1);
  });
  return counts;
}

// picks one canonical display label per normalized Ordered By key (most frequent, longest as tiebreak)
function orderedByCanonicalLabels(){
  const groups = new Map();
  state.poLines.forEach(r=>{
    if(!r.ordered_by) return;
    const key = nameKey(r.ordered_by);
    if(!groups.has(key)) groups.set(key, new Map());
    const m = groups.get(key);
    m.set(r.ordered_by, (m.get(r.ordered_by)||0) + 1);
  });
  const labels = new Map();
  for(const [key, variants] of groups){
    let best = null, bestScore = -1;
    for(const [label, count] of variants){
      const score = count*1000 + label.length;
      if(score > bestScore){ bestScore = score; best = label; }
    }
    labels.set(key, best);
  }
  return labels;
}

function renderFilterCardRow(labelText, dim, options){
  const counts = facetCounts(dim);
  const totalCount = state.poLines.filter(r=>matchesFilters(r, state.filters, dim)).length;
  const activeVals = state.filters[dim];
  const visibleOptions = options.filter(o=>(counts.get(o.value)||0) > 0);
  return `
    <div class="filter-row">
      <div class="filter-row-label">${labelText}</div>
      <div class="filter-cards">
        <button type="button" class="filter-card ${!activeVals.length?'active':''}" data-dim="${dim}" data-value="">All <span class="count">${totalCount}</span></button>
        ${visibleOptions.map(o=>`<button type="button" class="filter-card ${activeVals.includes(o.value)?'active':''}" data-dim="${dim}" data-value="${o.value}">${o.label} <span class="count">${counts.get(o.value)||0}</span></button>`).join('')}
      </div>
    </div>
  `;
}

function renderOpenTable(){

    if(col === 'past_days'){ av = pastDaysOf(a); bv = pastDaysOf(b); av = av===null? -9999 : av; bv = bv===null? -9999 : bv; }
    else { av = a[col]; bv = b[col]; }
    if(av === null || av === undefined) av = '';
    if(bv === null || bv === undefined) bv = '';

    if(av > bv) return dir==='asc' ? 1 : -1;

// ============================================================
// LARGE ORDERS
// ============================================================
function matchesLargeFilters(r, filters, excludeDim){
  if(filters.activeOnly && !r.is_active) return false;
  if(Number(r.amount_ordered) < filters.threshold) return false;
  if(excludeDim!=='store' && filters.store.length && !filters.store.includes(String(r.store))) return false;
  if(excludeDim!=='productCode' && filters.productCode.length && !filters.productCode.includes(r.product_code)) return false;
  if(filters.etaMode === 'specific'){
    if(filters.etaDate && r.promise_date !== filters.etaDate) return false;
  } else {
    if(filters.etaFrom && (!r.promise_date || r.promise_date < filters.etaFrom)) return false;
    if(filters.etaTo && (!r.promise_date || r.promise_date > filters.etaTo)) return false;
  }
  if(filters.poSearch && !(r.po_number||'').toLowerCase().includes(filters.poSearch.toLowerCase())) return false;
  return true;
}
function largeFacetCounts(dim){
  const counts = new Map();
  state.poLines.forEach(r=>{
    if(!matchesLargeFilters(r, state.largeFilters, dim)) return;
    let key;
    if(dim === 'store') key = (r.store===null||r.store===undefined) ? null : String(r.store);
    else if(dim === 'productCode') key = r.product_code || null;
    if(key === null) return;
    counts.set(key, (counts.get(key)||0) + 1);
  });
  return counts;
}
function renderLargeFilterCardRow(labelText, dim, options){
  const counts = largeFacetCounts(dim);
  const totalCount = state.poLines.filter(r=>matchesLargeFilters(r, state.largeFilters, dim)).length;
  const activeVals = state.largeFilters[dim];
  const visibleOptions = options.filter(o=>(counts.get(o.value)||0) > 0);
  return `
    <div class="filter-row">
      <div class="filter-row-label">${labelText}</div>
      <div class="filter-cards">
        <button type="button" class="filter-card large-filter-card ${!activeVals.length?'active':''}" data-dim="${dim}" data-value="">All <span class="count">${totalCount}</span></button>

function attachUploadHandlers(){
  const dz = document.getElementById('dropzone');
  if(dz){
    const fileInput = document.getElementById('fileInput');
    dz.addEventListener('click', ()=>fileInput.click());
    fileInput.addEventListener('change', (e)=>{ if(e.target.files[0]){ state.stagedListingFile = e.target.files[0]; render(); } });
    ['dragenter','dragover'].forEach(ev=>dz.addEventListener(ev, (e)=>{ e.preventDefault(); dz.classList.add('drag'); }));
    ['dragleave','drop'].forEach(ev=>dz.addEventListener(ev, (e)=>{ e.preventDefault(); dz.classList.remove('drag'); }));
    dz.addEventListener('drop', (e)=>{ const f = e.dataTransfer.files[0]; if(f){ state.stagedListingFile = f; render(); } });
  }
  document.getElementById('clearListingFileBtn')?.addEventListener('click', ()=>{ state.stagedListingFile = null; render(); });
  const rdz = document.getElementById('receivedDropzone');
  if(rdz){
    const receivedFileInput = document.getElementById('receivedFileInput');
    rdz.addEventListener('click', ()=>receivedFileInput.click());
    receivedFileInput.addEventListener('change', (e)=>{ if(e.target.files[0]){ state.stagedSummaryFile = e.target.files[0]; render(); } });
    ['dragenter','dragover'].forEach(ev=>rdz.addEventListener(ev, (e)=>{ e.preventDefault(); rdz.classList.add('drag'); }));
    ['dragleave','drop'].forEach(ev=>rdz.addEventListener(ev, (e)=>{ e.preventDefault(); rdz.classList.remove('drag'); }));
    rdz.addEventListener('drop', (e)=>{ const f = e.dataTransfer.files[0]; if(f){ state.stagedSummaryFile = f; render(); } });
  }
  document.getElementById('clearSummaryFileBtn')?.addEventListener('click', ()=>{ state.stagedSummaryFile = null; render(); });
  document.getElementById('runUploadBtn')?.addEventListener('click', runQueuedUploads);
  document.getElementById('saveDateBufferBtn')?.addEventListener('click', async ()=>{
    const raw = parseInt(document.getElementById('dateBufferInput').value, 10);
    const days = (isNaN(raw) || raw < 0) ? 0 : raw;
    const btn = document.getElementById('saveDateBufferBtn');
    const errBox = document.getElementById('dateBufferError');
    const savedMsg = document.getElementById('dateBufferSavedMsg');
    errBox.classList.add('hidden');
    btn.disabled = true; btn.textContent = 'Saving…';
    try{
      await saveDateBufferDays(days);

      btn.disabled = false; btn.textContent = 'Save';

function showProgress(text, pct){
  const box = document.getElementById('progressBox');
  box.classList.remove('hidden');
  box.innerHTML = `<div>${text}</div>` + (pct!==undefined ? `<div class="bar"><div class="bar-fill" style="width:${pct}%"></div></div>` : '');
}
function hideProgress(){ document.getElementById('progressBox').classList.add('hidden'); }

function parseDateYYYYMMDD(v){
  if(v === undefined || v === null) return null;
  const s = String(v).trim();
  if(!/^\d{8}$/.test(s)) return null;
  const y = s.slice(0,4), m = s.slice(4,6), d = s.slice(6,8);
  return `${y}-${m}-${d}`;
}
function numOr(v, fallback){
  const n = parseFloat(v);
  return isNaN(n) ? fallback : n;
}

function mapCsvRow(r){
  const po_number = (r['PO Number']||'').trim();
  if(!po_number) return null;
  const storeRaw = (r['Store']||'').toString().trim();
  const store = storeRaw === '' ? null : parseInt(storeRaw, 10);
  const gross_cost = numOr(r['Gross Cost'], 0);
  const amount_ordered = numOr(r['Amount Ordered'], 0);
  return {
    po_number,
    store: isNaN(store) ? null : store,
    supplier: (r['Supplier']||'').trim() || null,
    product_code: (r['Product Code']||'').trim() || null,
    style_name: (r['Style / Name']||'').trim() || null,
    color_desc: (r['Color / Desc']||'').trim() || null,
    sidemark: (r['Sidemark']||'').trim() || null,
    amount_ordered,
    units: (r['Units']||'').trim() || null,
    promise_date: parseDateYYYYMMDD(r['Promise Date']),
    order_date: parseDateYYYYMMDD(r['Order Date']),
    status: (r['Status']||'').trim() || null,
    ordered_by: (r['Ordered By']||'').trim() || null,
    taken_by: (r['Taken By']||'').trim() || null,
    style_number: (r['Style Number']||'').trim() || null,
    manufacturer: (r['Manufacturer']||'').trim() || null,
    gross_cost,
    total_cost: Math.round(gross_cost * amount_ordered * 100) / 100,
    reference_number: (r['Reference #']||'').trim() || null
  };
}

function valuesEqual(a, b){
  const an = (a===undefined||a===null||a==='') ? null : a;
  const bn = (b===undefined||b===null||b==='') ? null : b;
  if(typeof an === 'number' || typeof bn === 'number'){
    const af = Number(an), bf = Number(bn);
    if(isNaN(af) && isNaN(bf)) return true;
    if(isNaN(af) || isNaN(bf)) return false;
    return Math.abs(af - bf) < 0.005;
  }
  return String(an ?? '') === String(bn ?? '');
}

async function upsertChunked(rows, chunkSize){
  for(let i=0; i<rows.length; i+=chunkSize){
    const chunk = rows.slice(i, i+chunkSize);
    const { error } = await sb.from('po_lines').upsert(chunk, { onConflict: 'po_number' });
    if(error) throw error;
    showProgress(`Saving PO lines… ${Math.min(i+chunkSize, rows.length).toLocaleString()} / ${rows.length.toLocaleString()}`, 40 + (i/rows.length)*40);
  }
}
async function insertChunked(table, rows, chunkSize){
  for(let i=0; i<rows.length; i+=chunkSize){
    const chunk = rows.slice(i, i+chunkSize);
    if(!chunk.length) continue;
    const { error } = await sb.from(table).insert(chunk);
    if(error) throw error;
  }
}

function parseAndProcessListingFile(file){
  return new Promise((resolve, reject)=>{
    showProgress('Parsing CSV…', 5);
    const openRows = [];
    Papa.parse(file, {
      header: true,
      skipEmptyLines: true,
      worker: true,
      step: (results)=>{
        const r = results.data;
        if((r['Status']||'').trim().toLowerCase() === 'open'){
          const mapped = mapCsvRow(r);
          if(mapped) openRows.push(mapped);
        }
      },
      complete: ()=>{ processUpload(openRows, file.name).then(resolve).catch(err=>{
        console.error(err);
        showProgress('Error: ' + err.message);
        setTimeout(hideProgress, 4000);
        reject(err);
      }); },
      error: (err)=>{ showProgress('Parse error: ' + err.message); setTimeout(hideProgress, 4000); reject(err); }
    });
  });
}

async function processUpload(openRowsRaw, filename){
  showProgress(`Parsed ${openRowsRaw.length.toLocaleString()} open rows. Deduplicating…`, 15);
  const byPo = new Map();
  openRowsRaw.forEach(r=>byPo.set(r.po_number, r)); // last one wins if dup within file
  const uploadRows = Array.from(byPo.values());

  showProgress('Creating batch record…', 20);
  const { data: batchRow, error: batchErr } = await sb.from('report_batches')
    .insert({ source_filename: filename, row_count: uploadRows.length }).select().single();
  if(batchErr) throw batchErr;
  const batchId = batchRow.id;

  showProgress('Loading current state…', 25);
  const existing = await loadAll();
  const existingByPo = new Map(existing.map(r=>[r.po_number, r]));
  const seenPoSet = new Set(uploadRows.map(r=>r.po_number));
  const nowIso = new Date().toISOString();

  const upserts = [];
  const historyEvents = [];

  for(const row of uploadRows){
    const prev = existingByPo.get(row.po_number);
    if(!prev){
      upserts.push({ ...row, first_seen_batch_id: batchId, first_seen_at: nowIso, last_seen_batch_id: batchId, last_seen_at: nowIso, is_active: true, worked: false, worked_at: null });
      historyEvents.push({ po_number: row.po_number, batch_id: batchId, event_type: 'created', changes: null, actor: state.currentUser, detected_at: nowIso });
    } else {
      const changes = [];
      FIELDS_TO_COMPARE.forEach(f=>{
        if(!valuesEqual(prev[f], row[f])) changes.push({ field: f, old: prev[f] ?? null, new: row[f] ?? null });
      });
      const wasInactive = prev.is_active === false;
      const promiseDateChanged = changes.some(c=>c.field === 'promise_date');
      // Worked is a "handled this cycle" flag, not a permanent one - every fresh upload resets it
      // so buyers re-review the current list rather than it staying checked off indefinitely.
      upserts.push({ ...row, first_seen_batch_id: prev.first_seen_batch_id, first_seen_at: prev.first_seen_at, last_seen_batch_id: batchId, last_seen_at: nowIso, is_active: true, worked: false, worked_at: null, ...(promiseDateChanged ? { pending_promise_date: null } : {}) });
      if(changes.length){
        historyEvents.push({ po_number: row.po_number, batch_id: batchId, event_type: wasInactive ? 'reappeared' : 'updated', changes, actor: state.currentUser, detected_at: nowIso });
      } else if(wasInactive){
        historyEvents.push({ po_number: row.po_number, batch_id: batchId, event_type: 'reappeared', changes: null, actor: state.currentUser, detected_at: nowIso });
      }
    }
  }

  const closedUpdates = [];
  for(const prev of existing){
    if(prev.is_active && !seenPoSet.has(prev.po_number)){
      closedUpdates.push({ po_number: prev.po_number, is_active: false });
      historyEvents.push({ po_number: prev.po_number, batch_id: batchId, event_type: 'closed', changes: null, actor: state.currentUser, detected_at: nowIso });
    }
  }

  showProgress(`Saving ${upserts.length.toLocaleString()} PO lines…`, 40);
  await upsertChunked(upserts, 500);
  if(closedUpdates.length){
    showProgress(`Marking ${closedUpdates.length.toLocaleString()} POs closed…`, 82);
    await upsertChunked(closedUpdates, 500);
  }
  showProgress(`Writing ${historyEvents.length.toLocaleString()} history events…`, 90);
  await insertChunked('po_line_history', historyEvents, 500);

  showProgress('Done. Refreshing…', 100);
  await refreshData();
  setTimeout(hideProgress, 1500);
}

// ============================================================
function parseAndProcessSummaryFile(file){
  return new Promise((resolve, reject)=>{
    showProgress('Parsing received-qty report…', 5);
    const rows = [];
    Papa.parse(file, {
      header: true,
      skipEmptyLines: true,
      worker: true,
      step: (results)=>{
        const r = results.data;
        const po = (r['PO Number']||'').trim();
        if(!po) return;
        const received = parseFloat(r['Amount Received']);
        if(isNaN(received)) return;
        rows.push({ po_number: po, amount_received: received });
      },
      complete: ()=>{ processReceivedUpload(rows, file.name).then(resolve).catch(err=>{
        console.error(err);
        showProgress('Error: ' + err.message);
        setTimeout(hideProgress, 4000);
        reject(err);
      }); },
      error: (err)=>{ showProgress('Parse error: ' + err.message); setTimeout(hideProgress, 4000); reject(err); }
    });
  });
}

async function runQueuedUploads(){
  if(!state.stagedListingFile || !state.stagedSummaryFile) return;
  const listingFile = state.stagedListingFile;
  const summaryFile = state.stagedSummaryFile;
  const btn = document.getElementById('runUploadBtn');
  if(btn) btn.disabled = true;
  try{
    await parseAndProcessListingFile(listingFile);
    await parseAndProcessSummaryFile(summaryFile);
  } catch(err){
    // error already surfaced via showProgress inside the parse/process functions
  } finally {
    state.stagedListingFile = null;
    state.stagedSummaryFile = null;
    render();
  }
}

async function processReceivedUpload(rows, filename){
  showProgress(`Parsed ${rows.length.toLocaleString()} rows. Matching to existing POs…`, 10);
  const existingPoSet = new Set(state.poLines.map(r=>r.po_number));
  const byPo = new Map();
  rows.forEach(r=>byPo.set(r.po_number, r.amount_received)); // last one wins if dup within file
  const toUpdate = Array.from(byPo.entries()).filter(([po])=>existingPoSet.has(po));
  const skipped = byPo.size - toUpdate.length;

  const CONCURRENCY = 20;
  let done = 0;
  for(let i=0; i<toUpdate.length; i+=CONCURRENCY){
    const batch = toUpdate.slice(i, i+CONCURRENCY);
    await Promise.all(batch.map(([po, amt])=>
      sb.from('po_lines').update({ amount_received: amt }).eq('po_number', po)
    ));
    done += batch.length;
    showProgress(`Updating PO lines… ${done.toLocaleString()} / ${toUpdate.length.toLocaleString()}`, 10 + (done/Math.max(toUpdate.length,1))*80);
  }

  showProgress(`Done. ${toUpdate.length.toLocaleString()} updated${skipped ? `, ${skipped.toLocaleString()} skipped (PO not found)` : ''}. Refreshing…`, 95);
  await saveLastReceivedUpload(filename);
  await refreshData();
  setTimeout(hideProgress, 2500);
}

async function openHistoryModal(poNumber){

  showModal(`<span class="close" id="modalClose">&times;</span><h2>${poNumber}</h2><p class="empty">Loading history…</p>`);
  document.getElementById('modalClose').addEventListener('click', closeModal);

  const { data: history, error } = await sb.from('po_line_history').select('*').eq('po_number', poNumber).order('detected_at', { ascending: true });
  if(error){ showModal(`<span class="close" id="modalClose">&times;</span><h2>${poNumber}</h2><p class="empty">Error loading history.</p>`); document.getElementById('modalClose').addEventListener('click', closeModal); return; }

  const header = row ? `
    <div style="font-size:13px;color:var(--muted);margin-bottom:14px;">
      ${row.supplier || ''} · ${row.style_name || ''} ${row.color_desc ? ('· '+row.color_desc) : ''}<br>
      Store ${row.store ?? '—'} · Ordered by ${row.ordered_by || '—'} · Promise ${fmtDate(row.promise_date)} · ${row.is_active===false ? '<span class="badge blank">closed</span>' : `<span class="badge ${bucketOf(row)}">${fmtPastDays(row)}</span>`}
    </div>` : '';

  const events = history.map(ev=>{
    let body = '';
    if(ev.event_type === 'created'){ body = 'First appeared on an upload.'; }
    else if(ev.event_type === 'closed'){ body = 'No longer on the Open export (shipped / satisfied / canceled elsewhere).'; }
    else if(ev.event_type === 'reappeared'){ body = 'Back on the Open export after being closed.'; }
    else if(ev.event_type === 'updated'){
      body = (ev.changes||[]).map(c=>`<div class="tl-diff"><span class="f">${c.field}:</span> ${c.old ?? '—'} → <strong>${c.new ?? '—'}</strong></div>`).join('');
    }
    else if(ev.event_type === 'manual_update'){
      body = (ev.changes||[]).map(c=>`<div class="tl-diff"><span class="f">${c.field}:</span> ${c.old ?? '—'} → <strong>${c.new ?? '—'}</strong> <span style="color:var(--good);">(confirmed in RFMS)</span></div>`).join('');
    }
    else if(ev.event_type === 'unverified_update'){
      body = (ev.changes||[]).map(c=>`<div class="tl-diff"><span class="f">${c.field}:</span> ${c.old ?? '—'} → <strong>${c.new ?? '—'}</strong> <span style="color:var(--warn);">(unverified — not yet confirmed in RFMS)</span></div>`).join('');
    }
    else if(ev.event_type === 'worked'){ body = 'Marked as worked.' + (ev.changes && ev.changes.note ? `<div class="tl-diff"><span class="f">Note:</span> ${escapeAttr(ev.changes.note)}</div>` : ''); }
    else if(ev.event_type === 'unworked'){ body = 'Unmarked as worked.' + (ev.changes && ev.changes.note ? `<div class="tl-diff"><span class="f">Note:</span> ${escapeAttr(ev.changes.note)}</div>` : ''); }
    return `<div class="tl-event">
      <div class="tl-date">${new Date(ev.detected_at).toLocaleString()}${ev.actor ? ` · <span style="color:var(--accent);">${escapeAttr(ev.actor)}</span>` : ''}</div>
      <div class="tl-type">${ev.event_type}</div>
      ${body}
    </div>`;
  }).join('') || '<p class="empty">No history yet.</p>';

  showModal(`<span class="close" id="modalClose">&times;</span><h2>${poNumber}</h2>${header}<div class="timeline">${events}</div>`);
  document.getElementById('modalClose').addEventListener('click', closeModal);
}

// ============================================================
// manual Promise Date edit (worked from the All Open POs page)
// ============================================================
function openPromiseEditModal(poNumber){
  const row = state.poLines.find(r=>r.po_number === poNumber);
  if(!row) return;
  showModal(`
    <span class="close" id="modalClose">&times;</span>
    <h2>Update Promise Date</h2>
    <div style="font-size:13px;color:var(--muted);margin-bottom:14px;">
      <strong>${poNumber}</strong> · ${row.supplier || ''} · ${row.style_name || ''}${row.color_desc ? (' · '+row.color_desc) : ''}<br>
      Current promise date: <strong>${fmtDate(row.promise_date)}</strong>
      ${row.pending_promise_date ? `<br>Pending unverified date: <strong>${fmtDate(row.pending_promise_date)}</strong>` : ''}
    </div>
    <label style="display:block;font-size:12px;color:var(--muted);margin-bottom:4px;">New promise date</label>
    <input type="date" id="promiseDateInput" value="${row.promise_date || ''}" style="padding:8px 10px;border:1px solid var(--border);border-radius:7px;width:100%;margin-bottom:14px;">
    <label style="display:flex;align-items:center;gap:8px;font-size:13px;margin-bottom:6px;">
      <input type="checkbox" id="rfmsCheckbox"> Updated in RFMS
    </label>
    <p style="color:var(--muted);font-size:12px;margin-bottom:16px;">
      Checked: this becomes the tracked promise date. Unchecked: logged as an <strong>unverified</strong> note only —
      the tracked promise date won't change until RFMS is updated and this report is re-uploaded.
    </p>
    <div id="promiseError" class="pw-error hidden"></div>
    <div style="display:flex;gap:8px;justify-content:flex-end;">
      <button class="btn secondary" id="promiseCancelBtn">Cancel</button>
      <button class="btn" id="promiseSaveBtn">Save</button>
    </div>
  `);
  document.getElementById('modalClose').addEventListener('click', closeModal);
  document.getElementById('promiseCancelBtn').addEventListener('click', closeModal);
  document.getElementById('promiseSaveBtn').addEventListener('click', ()=>savePromiseUpdate(poNumber));
}

async function savePromiseUpdate(poNumber){
  const row = state.poLines.find(r=>r.po_number === poNumber);
  if(!row) return;
  const newDate = document.getElementById('promiseDateInput').value || null;
  const verified = document.getElementById('rfmsCheckbox').checked;
  const btn = document.getElementById('promiseSaveBtn');
  const errBox = document.getElementById('promiseError');
  btn.disabled = true; btn.textContent = 'Saving…';
  const nowIso = new Date().toISOString();
  try{
    if(verified){
      const oldDate = row.promise_date;
      const { error } = await sb.from('po_lines').update({ promise_date: newDate, pending_promise_date: null }).eq('po_number', poNumber);
      if(error) throw error;
      if(!valuesEqual(oldDate, newDate)){
        const { error: histErr } = await sb.from('po_line_history').insert({ po_number: poNumber, batch_id: null, event_type: 'manual_update', changes: [{ field: 'promise_date', old: oldDate, new: newDate }], actor: state.currentUser, detected_at: nowIso });
        if(histErr) throw histErr;
      }
      row.promise_date = newDate;
      row.pending_promise_date = null;
    } else {
      const { error } = await sb.from('po_lines').update({ pending_promise_date: newDate }).eq('po_number', poNumber);
      if(error) throw error;
      const { error: histErr } = await sb.from('po_line_history').insert({ po_number: poNumber, batch_id: null, event_type: 'unverified_update', changes: [{ field: 'promise_date', old: row.promise_date, new: newDate }], actor: state.currentUser, detected_at: nowIso });
      if(histErr) throw histErr;
      row.pending_promise_date = newDate;
    }
    closeModal();
    render();
  } catch(err){
    errBox.textContent = 'Error saving: ' + err.message;
    errBox.classList.remove('hidden');
    btn.disabled = false; btn.textContent = 'Save';
  }
}

// ============================================================
// Worked stage (checkbox on All Open POs) - clicking it opens a confirm modal with an
// optional note instead of toggling immediately; the native checkbox change is prevented
// until Confirm, and Cancel leaves it untouched.
// ============================================================
function openWorkedConfirmModal(poNumber, newValue){
  const row = state.poLines.find(r=>r.po_number === poNumber);
  if(!row) return;
  showModal(`
    <span class="close" id="modalClose">&times;</span>
    <h2>${newValue ? 'Mark as Worked' : 'Unmark as Worked'}</h2>
    <div style="font-size:13px;color:var(--muted);margin-bottom:14px;">
      <strong>${poNumber}</strong> · ${row.supplier || ''} · ${row.style_name || ''}${row.color_desc ? (' · '+row.color_desc) : ''}
    </div>
    <label style="display:block;font-size:12px;color:var(--muted);margin-bottom:4px;">Notes (optional)</label>
    <textarea id="workedNoteInput" rows="3" style="width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:7px;font-family:inherit;font-size:13px;margin-bottom:14px;resize:vertical;" placeholder="Add a note about this…" autofocus></textarea>
    <div id="workedConfirmError" class="pw-error hidden"></div>
    <div style="display:flex;gap:8px;justify-content:flex-end;">
      <button class="btn secondary" id="workedCancelBtn">Cancel</button>
      <button class="btn" id="workedConfirmBtn">Confirm</button>
    </div>
  `);
  document.getElementById('modalClose').addEventListener('click', closeModal);
  document.getElementById('workedCancelBtn').addEventListener('click', closeModal);
  document.getElementById('workedConfirmBtn').addEventListener('click', ()=>confirmWorkedToggle(poNumber, newValue));
}

async function confirmWorkedToggle(poNumber, newValue){
  const row = state.poLines.find(r=>r.po_number === poNumber);
  if(!row) return;
  const note = document.getElementById('workedNoteInput').value.trim();
  const btn = document.getElementById('workedConfirmBtn');
  const errBox = document.getElementById('workedConfirmError');
  btn.disabled = true; btn.textContent = 'Saving…';
  const nowIso = new Date().toISOString();
  try{
    const { error } = await sb.from('po_lines').update({ worked: newValue, worked_at: newValue ? nowIso : null }).eq('po_number', poNumber);
    if(error) throw error;
    const { error: histErr } = await sb.from('po_line_history').insert({
      po_number: poNumber, batch_id: null, event_type: newValue ? 'worked' : 'unworked',
      changes: note ? { note } : null, actor: state.currentUser, detected_at: nowIso
    });
    if(histErr) throw histErr;
    row.worked = newValue;
    row.worked_at = newValue ? nowIso : null;
    closeModal();
    render();
  } catch(err){
    errBox.textContent = 'Error saving: ' + err.message;
    errBox.classList.remove('hidden');
    btn.disabled = false; btn.textContent = 'Confirm';
  }
}

// ============================================================
// view-level event wiring
// ============================================================
function attachViewHandlers(){
  if(state.view === 'upload'){ attachUploadHandlers(); return; }

  document.querySelectorAll('tr.po-row').forEach(tr=>{
    tr.addEventListener('click', ()=>openHistoryModal(tr.dataset.po));
  });

  if(state.view === 'rollup'){
    document.getElementById('metricToggle')?.addEventListener('click', (e)=>{
      const b = e.target.closest('button[data-metric]'); if(!b) return;
      state.rollupMetric = b.dataset.metric; render();
    });
    document.getElementById('groupToggle')?.addEventListener('click', (e)=>{
      const b = e.target.closest('button[data-group]'); if(!b) return;
      state.rollupGroupBy = b.dataset.group; render();
    });
    document.getElementById('scopeToggle')?.addEventListener('click', (e)=>{
      const b = e.target.closest('button[data-scope]'); if(!b) return;
      state.rollupScope = b.dataset.scope; render();
    });
  }

  if(state.view === 'large'){
    document.querySelectorAll('.large-filter-card').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        toggleFilterValue(state.largeFilters, btn.dataset.dim, btn.dataset.value);
        render();
      });
    });
    document.getElementById('f-large-threshold')?.addEventListener('input', (e)=>{
      const v = parseFloat(e.target.value);
      state.largeFilters.threshold = isNaN(v) ? 0 : v;
      render();
    });
    document.getElementById('f-large-activeOnly')?.addEventListener('change', (e)=>{ state.largeFilters.activeOnly = e.target.checked; render(); });
    document.getElementById('f-large-po-search')?.addEventListener('input', (e)=>{ state.largeFilters.poSearch = e.target.value; render(); });
    document.getElementById('etaModeToggle')?.addEventListener('click', (e)=>{
      const b = e.target.closest('button[data-etamode]'); if(!b) return;
      state.largeFilters.etaMode = b.dataset.etamode;
      render();
    });
    document.getElementById('f-large-eta-date')?.addEventListener('change', (e)=>{ state.largeFilters.etaDate = e.target.value; render(); });
    document.getElementById('f-large-eta-from')?.addEventListener('change', (e)=>{ state.largeFilters.etaFrom = e.target.value; render(); });
    document.getElementById('f-large-eta-to')?.addEventListener('change', (e)=>{ state.largeFilters.etaTo = e.target.value; render(); });
    document.getElementById('clearEtaBtn')?.addEventListener('click', ()=>{
      state.largeFilters.etaDate = ''; state.largeFilters.etaFrom = ''; state.largeFilters.etaTo = '';
      render();
    });
    document.getElementById('etaPresetGroup')?.addEventListener('click', (e)=>{
      const b = e.target.closest('button[data-preset]'); if(!b) return;
      const range = etaPresetRanges()[b.dataset.preset];
      state.largeFilters.etaMode = 'range';
      state.largeFilters.etaFrom = range.from;
      state.largeFilters.etaTo = range.to;
      render();
    });
    document.querySelectorAll('th[data-col]').forEach(th=>{
      th.addEventListener('click', ()=>{
        const col = th.dataset.col;
        if(state.largeSort.col === col) state.largeSort.dir = state.largeSort.dir==='asc' ? 'desc' : 'asc';
        else { state.largeSort.col = col; state.largeSort.dir = 'asc'; }
        render();
      });
    });
  }

  if(state.view === 'open'){
    document.getElementById('receivedStatusToggle')?.addEventListener('click', (e)=>{
      const b = e.target.closest('button[data-received]'); if(!b) return;
      state.filters.receivedStatus = b.dataset.received;
      render();
    });
    document.getElementById('clearAllFiltersBtn')?.addEventListener('click', ()=>{
      state.filters = { orderedBy: [], store: [], supplier: '', vendor: [], bucket: [], worked: [], search: '', activeOnly: true, purchasingOnly: false, receivedStatus: '' };
      render();
    });
    document.querySelectorAll('.filter-card').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        toggleFilterValue(state.filters, btn.dataset.dim, btn.dataset.value);
        render();
      });
    });
    document.querySelectorAll('td.promise-cell').forEach(td=>{
      td.addEventListener('click', (e)=>{ e.stopPropagation(); openPromiseEditModal(td.dataset.po); });
    });
    document.querySelectorAll('.worked-checkbox').forEach(cb=>{
      cb.addEventListener('click', (e)=>{
        e.stopPropagation();
        e.preventDefault(); // don't let the box actually toggle until the modal is confirmed
        // Read the proposed new value from the data model, not cb.checked - the browser already
        // flips a checkbox's `checked` before dispatching 'click', so cb.checked here is the
        // POST-toggle value; using it directly (or its negation) gets the direction backwards.
        const row = state.poLines.find(r=>r.po_number === cb.dataset.po);
        openWorkedConfirmModal(cb.dataset.po, row ? !row.worked : true);
      });
    });
    document.querySelectorAll('.copy-po-btn').forEach(btn=>{
      btn.addEventListener('click', (e)=>{
        e.stopPropagation();
        navigator.clipboard.writeText(btn.dataset.po).then(()=>{
          const original = btn.textContent;
          btn.textContent = '✅';
          setTimeout(()=>{ btn.textContent = original; }, 1000);
        });
      });
    });
    document.getElementById('f-supplier')?.addEventListener('input', (e)=>{ state.filters.supplier = e.target.value; render(); });
    document.getElementById('f-search')?.addEventListener('input', (e)=>{ state.filters.search = e.target.value; render(); });
    document.getElementById('f-activeOnly')?.addEventListener('change', (e)=>{ state.filters.activeOnly = e.target.checked; render(); });
    document.getElementById('f-purchasingOnly')?.addEventListener('change', (e)=>{ state.filters.purchasingOnly = e.target.checked; render(); });
    document.getElementById('f-showCost')?.addEventListener('change', (e)=>{ state.showCost = e.target.checked; render(); });
    document.getElementById('exportBtn')?.addEventListener('click', exportCsv);
    document.querySelectorAll('th[data-col]').forEach(th=>{
      th.addEventListener('click', ()=>{
        const col = th.dataset.col;
        if(state.sort.col === col) state.sort.dir = state.sort.dir==='asc' ? 'desc' : 'asc';
        else { state.sort.col = col; state.sort.dir = 'asc'; }
        render();
      });
    });
  }
}

function exportCsv(){
  const rows = filterRows(state.filters);
  const csv = Papa.unparse(rows.map(r=>({
    Worked: r.worked ? 'Yes' : 'No', Store: r.store, Supplier: r.supplier, 'PO Number': r.po_number, Style: r.style_name, Color: r.color_desc,
    'Ordered By': r.ordered_by, 'Order Date': r.order_date, 'Promise Date': r.promise_date,
    'Past Days': pastDaysOf(r), Bucket: BUCKET_LABELS[bucketOf(r)], 'Total Cost': r.total_cost, 'Reference #': r.reference_number
  })));
  const blob = new Blob([csv], { type:'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'eta-report-export.csv'; a.click();
  URL.revokeObjectURL(url);
}

// ---------- init ----------
// Allows deep-linking straight to a tab, e.g. ?view=large from the Purchasing Portal.
(function(){
  const requestedView = new URLSearchParams(window.location.search).get('view');
  if(['rollup','open','large'].includes(requestedView)){
    state.view = requestedView;
    document.querySelectorAll('#mainNav button[data-view]').forEach(b=>b.classList.toggle('active', b.dataset.view===requestedView));
  }
})();

document.getElementById('switchUserBtn').addEventListener('click', ()=>{
  clearStoredIdentity();
  state.currentUser = null;
  state.poLines = [];
  state.lastBatch = null;
  document.getElementById('lastUpdated').textContent = '';
  boot();
});

function boot(){
  const identity = getStoredIdentity();
  if(!identity){
    renderIdentityGate();
    return;
  }
  state.currentUser = identity;
  document.getElementById('currentUserLabel').textContent = identity;
  document.getElementById('identityBox').classList.remove('hidden');
  refreshData().catch(err=>{
    console.error(err);
    document.getElementById('app').innerHTML = `<div class="panel"><p class="empty">Failed to load data: ${err.message}</p></div>`;
  });
}
boot();
</script>
